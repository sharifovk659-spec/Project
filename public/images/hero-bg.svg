<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="spotlight" cx="35%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#8a7040" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1610"/>
      <stop offset="60%" stop-color="#0f0e0c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="smoke" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8dfd0" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#c9a962" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="smokeBlur">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#spotlight)"/>

  <ellipse cx="400" cy="750" rx="600" ry="200" fill="url(#smoke)" filter="url(#smokeBlur)" opacity="0.7"/>
  <ellipse cx="1200" cy="650" rx="500" ry="180" fill="url(#smoke)" filter="url(#smokeBlur)" opacity="0.5"/>
  <ellipse cx="800" cy="500" rx="350" ry="120" fill="#e8dfd0" fill-opacity="0.03" filter="url(#softBlur)"/>

  <rect x="1050" y="420" width="480" height="360" rx="6" fill="#12100e" stroke="#c9a962" stroke-opacity="0.15" stroke-width="1.5"/>
  <circle cx="1180" cy="560" r="95" fill="none" stroke="#c9a962" stroke-opacity="0.35" stroke-width="2.5"/>
  <circle cx="1180" cy="560" r="62" fill="#0d0c0a" stroke="#d4af37" stroke-opacity="0.25" stroke-width="2"/>
  <circle cx="1180" cy="560" r="28" fill="#1a1814" stroke="#a89f8f" stroke-opacity="0.2"/>

  <rect x="1320" y="500" width="140" height="100" rx="3" fill="#111" stroke="#a89f8f" stroke-opacity="0.2"/>
  <rect x="1100" y="720" width="200" height="12" rx="2" fill="#c9a962" fill-opacity="0.15"/>

  <line x1="600" y1="200" x2="900" y2="500" stroke="#d4af37" stroke-opacity="0.08" stroke-width="80" filter="url(#softBlur)"/>
  <line x1="0" y1="950" x2="1920" y2="950" stroke="#c9a962" stroke-opacity="0.08"/>
</svg>
